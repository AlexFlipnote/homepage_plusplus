<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"/>
    <link href="css/index.css" type="text/css" rel="stylesheet">
  </head>
  <body style="width: 22rem; position: relative;">
    <a href="options.html" target="_blank" id="window-settings-btn" title="Open settings" aria-label="Open settings"></a>
    <div class="box-container text-center">
      <div class="sidebar-header">
        <img src="images/logo.png" alt="Homepage Logo">
        <h1 class="no-margin" data-translate="window.title"></h1>
        <span id="version-label"></span>
      </div>
      <p class="no-margin" data-translate="window.description"></p>
    </div>
    <div id="window-notepad-section" style="display: none;">
      <textarea id="window-notepad-text" spellcheck="false"></textarea>
    </div>
    <script src="js/options.js"></script>
  </body>
</html>
