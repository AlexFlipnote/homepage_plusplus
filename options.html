<!DOCTYPE html>
<html>
  <head>
    <title>Homepage++ - Settings</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="css/index.css" type="text/css" rel="stylesheet">
  </head>
  <body class="settings-page">

    <div class="settings-layout">

      <nav class="settings-sidebar">
        <div class="sidebar-header">
          <img src="images/logo.png" alt="Homepage Logo">
          <span>Homepage++ <span id="version-label"></span></span>
        </div>

        <span class="sidebar-category" data-translate="settings.nav.category.general"></span>
        <button class="sidebar-item active" data-section="general" data-category="general" data-translate="settings.nav.section.general"></button>
        <button class="sidebar-item" data-section="timestamp" data-category="general" data-translate="settings.nav.section.timestamp"></button>

        <span class="sidebar-category" data-translate="settings.nav.category.appearance"></span>
        <button class="sidebar-item" data-section="background" data-category="appearance" data-translate="settings.nav.section.background"></button>
        <button class="sidebar-item" data-section="font" data-category="appearance" data-translate="settings.nav.section.font"></button>
        <button class="sidebar-item" data-section="hexbg" data-category="appearance" data-translate="settings.nav.section.hexbg"></button>

        <span class="sidebar-category" data-translate="settings.nav.category.features"></span>
        <button class="sidebar-item" data-section="weather" data-category="features" data-translate="settings.nav.section.weather"></button>
        <button class="sidebar-item" data-section="bookmarks" data-category="features" data-translate="settings.nav.section.bookmarks"></button>
        <button class="sidebar-item" data-section="notepad" data-category="features" data-translate="settings.nav.section.notepad"></button>

        <span class="sidebar-category" data-translate="settings.nav.category.advanced"></span>
        <button class="sidebar-item" data-section="customcss" data-category="advanced" data-translate="settings.nav.section.customcss"></button>
        <button class="sidebar-item" data-section="backup" data-category="advanced" data-translate="settings.nav.section.backup"></button>
        <button class="sidebar-item" data-section="translations" data-category="advanced" data-translate="settings.nav.section.translations"></button>

        <div class="sidebar-footer">
          <a href="https://discord.gg/yqb7vATbjH" title="Discord">
            <img src="./images/icons/discord.png" class="bookmark-icon">
          </a>
          <a href="https://github.com/AlexFlipnote/homepage_plusplus" title="GitHub">
            <img src="./images/icons/github.png" class="bookmark-icon">
          </a>
        </div>
      </nav>

      <main class="settings-content">

        <!-- General -->
        <section class="settings-section active" id="section-general">
          <h2 class="section-title" data-translate="settings.general.title"></h2>

          <div class="setting-group">
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.general.language.title"></span>
                <span class="setting-desc" data-translate="settings.general.language.desc"></span>
              </div>
              <select id="language">
                <option value="">Default: English (United Kingdom)</option>
              </select>
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.general.show_time.title"></span>
              </div>
              <input type="checkbox" id="show_time">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.general.show_date.title"></span>
              </div>
              <input type="checkbox" id="show_date">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.general.searchbar.title"></span>
              </div>
              <input type="checkbox" id="searchbar">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.general.show_settings.title"></span>
              </div>
              <input type="checkbox" id="show-settings">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.general.animations.title"></span>
              </div>
              <input type="checkbox" id="animations">
            </div>
          </div>
        </section>

        <!-- Timestamp -->
        <section class="settings-section" id="section-timestamp">
          <h2 class="section-title" data-translate="settings.timestamp.title"></h2>
          <p class="section-desc" data-translate="settings.timestamp.desc"></p>

          <div class="setting-group">
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.timestamp.clock_style.title"></span>
                <span class="setting-desc" data-translate="settings.timestamp.clock_style.desc"></span>
              </div>
              <select id="clock_style">
                <option value="0">Digital (Default)</option>
                <option value="1">Tumbler</option>
                <option value="2">Analog (Swiss)</option>
                <option value="3">Hex Colour</option>
              </select>
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.timestamp.clock_jumbo.title"></span>
                <span class="setting-desc" data-translate="settings.timestamp.clock_jumbo.desc"></span>
              </div>
              <input type="checkbox" id="clock_jumbo">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.timestamp.time_format.title"></span>
                <span class="setting-desc" data-translate="settings.timestamp.time_format.desc"></span>
              </div>
              <input id="fmt_time" placeholder="%H:%M:%S">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.timestamp.date_format.title"></span>
                <span class="setting-desc" data-translate="settings.timestamp.date_format.desc"></span>
              </div>
              <input id="fmt_date" placeholder="%e. %B %Y">
            </div>
          </div>

          <h3 class="subsection-title" data-translate="settings.timestamp.format_ref"></h3>
          <div class="format-ref-table">
            <table cellspacing="0" cellpadding="0">
              <thead>
                <tr>
                  <th data-translate="settings.timestamp.format_ref.col.format"></th>
                  <th data-translate="settings.timestamp.format_ref.col.desc"></th>
                </tr>
              </thead>
              <tbody>
                <tr><td>%Y</td><td data-translate="settings.timestamp.format_ref.pct_Y"></td></tr>
                <tr><td>%y</td><td data-translate="settings.timestamp.format_ref.pct_y"></td></tr>
                <tr><td>%m</td><td data-translate="settings.timestamp.format_ref.pct_m"></td></tr>
                <tr><td>%B</td><td data-translate="settings.timestamp.format_ref.pct_B"></td></tr>
                <tr><td>%b</td><td data-translate="settings.timestamp.format_ref.pct_b"></td></tr>
                <tr><td>%d</td><td data-translate="settings.timestamp.format_ref.pct_d"></td></tr>
                <tr><td>%e</td><td data-translate="settings.timestamp.format_ref.pct_e"></td></tr>
                <tr><td>%j</td><td data-translate="settings.timestamp.format_ref.pct_j"></td></tr>
                <tr><td>%A</td><td data-translate="settings.timestamp.format_ref.pct_A"></td></tr>
                <tr><td>%a</td><td data-translate="settings.timestamp.format_ref.pct_a"></td></tr>
                <tr><td>%w</td><td data-translate="settings.timestamp.format_ref.pct_w"></td></tr>
                <tr><td>%H</td><td data-translate="settings.timestamp.format_ref.pct_H"></td></tr>
                <tr><td>%I</td><td data-translate="settings.timestamp.format_ref.pct_I"></td></tr>
                <tr><td>%p</td><td data-translate="settings.timestamp.format_ref.pct_p"></td></tr>
                <tr><td>%M</td><td data-translate="settings.timestamp.format_ref.pct_M"></td></tr>
                <tr><td>%S</td><td data-translate="settings.timestamp.format_ref.pct_S"></td></tr>
                <tr><td>%f</td><td data-translate="settings.timestamp.format_ref.pct_f"></td></tr>
                <tr><td>%z</td><td data-translate="settings.timestamp.format_ref.pct_z"></td></tr>
                <tr><td>%Z</td><td data-translate="settings.timestamp.format_ref.pct_Z"></td></tr>
                <tr><td>%F</td><td data-translate="settings.timestamp.format_ref.pct_F"></td></tr>
                <tr><td>%T</td><td data-translate="settings.timestamp.format_ref.pct_T"></td></tr>
                <tr><td>%%</td><td data-translate="settings.timestamp.format_ref.pct_pct"></td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <!-- Background -->
        <section class="settings-section" id="section-background">
          <h2 class="section-title" data-translate="settings.background.title"></h2>
          <p class="section-desc" data-translate="settings.background.desc"></p>

          <div id="custombg_previews">
            <div class="file-container">
              <img src="images/icons/upload_image.png" class="icon">
              <span class="message" data-translate="settings.background.upload_hint"></span>
              <input type="file" id="custombg_uploader" accept="image/png,image/jpeg,image/gif" multiple>
            </div>
          </div>

          <div class="section-actions">
            <button id="custombg_prune" class="error-bg" data-translate="settings.background.delete_all"></button>
          </div>
        </section>

        <!-- Font -->
        <section class="settings-section" id="section-font">
          <h2 class="section-title" data-translate="settings.font.title"></h2>
          <p class="section-desc" data-translate="settings.font.desc"></p>

          <div class="setting-group">
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.font.font_name.title"></span>
              </div>
              <input type="text" id="customfont" placeholder="Type custom font here...">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.font.google_fonts.title"></span>
                <span class="setting-desc" data-translate="settings.font.google_fonts.desc"></span>
              </div>
              <input type="checkbox" id="customfontgoogle">
            </div>
          </div>
        </section>

        <!-- HEX Background -->
        <section class="settings-section" id="section-hexbg">
          <h2 class="section-title" data-translate="settings.hexbg.title"></h2>
          <p class="section-desc" data-translate="settings.hexbg.desc"></p>

          <div class="hex-demo" id="hexbgdemobg">
            <span class="hex-demo-label">Current: <span id="hexbgdemotext"></span></span>
          </div>

          <div class="setting-group">
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.hexbg.enable.title"></span>
                <span class="setting-desc" data-translate="settings.hexbg.enable.desc"></span>
              </div>
              <input type="checkbox" id="hexbg">
            </div>
          </div>
        </section>

        <!-- Weather -->
        <section class="settings-section" id="section-weather">
          <h2 class="section-title" data-translate="settings.weather.title"></h2>
          <p class="section-desc" data-translate="settings.weather.desc"></p>

          <div class="setting-group">
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.weather.enable.title"></span>
              </div>
              <input type="checkbox" id="wEnable">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.weather.hourly.title"></span>
              </div>
              <input type="checkbox" id="wShowHourly">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.weather.daily_days.title"></span>
                <span class="setting-desc" data-translate="settings.weather.daily_days.desc"></span>
              </div>
              <div class="slider-row">
                <input type="range" id="wDailyDays" min="0" max="3" step="1">
                <span class="slider-value" id="wDailyDays-label">0</span>
              </div>
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.weather.temp_unit.title"></span>
              </div>
              <select id="temp_type">
                <option value="celcius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
              </select>
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.weather.manual_location.title"></span>
                <span class="setting-desc" data-translate="settings.weather.manual_location.desc"></span>
              </div>
              <input type="checkbox" id="wManualLocation">
            </div>
          </div>

          <div id="map">
            <div class="map-coords">
              <span id="wlat"></span>, <span id="wlon"></span>
            </div>
          </div>
        </section>

        <!-- Bookmarks -->
        <section class="settings-section" id="section-bookmarks">
          <h2 class="section-title" data-translate="settings.bookmarks.title"></h2>
          <p class="section-desc" data-translate="settings.bookmarks.desc"></p>

          <div class="setting-group">
            <div class="setting-row" id="bmFavFirefox">
              <div class="setting-label">
                <span data-translate="settings.bookmarks.favicon.title"></span>
                <span class="setting-desc" data-translate="settings.bookmarks.favicon.desc"></span>
              </div>
              <input type="checkbox" id="bookmarksFavicon">
            </div>
          </div>

          <div id="blist" class="bookmark-container"></div>

          <div class="bookmark-container">
            <div class="bookmark-item">
              <input id="bookmark_name" class="secondary" placeholder="Bookmark name">
              <input id="bookmark_url" class="secondary" placeholder="https://example.com">
              <img id="add_bookmark" src="images/icons/bookmark_add.png" alt="Add bookmark">
            </div>
          </div>

          <h3 class="subsection-title" data-translate="settings.bookmarks.top_sites.subtitle"></h3>
          <p class="section-desc" data-translate="settings.bookmarks.top_sites.section_desc"></p>

          <div class="setting-group">
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.bookmarks.top_sites.title"></span>
              </div>
              <input type="checkbox" id="bookmarksTopSitesEnabled">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row setting-row--column">
              <div class="setting-label">
                <span data-translate="settings.bookmarks.top_sites.amount.title"></span>
              </div>
              <div class="slider-row">
                <input type="range" id="bookmarksTopSitesAmount" min="1" max="10" step="1">
                <span class="slider-value" id="bookmarksTopSitesAmount-label">5</span>
              </div>
            </div>
          </div>
        </section>

        <!-- Notepad -->
        <section class="settings-section" id="section-notepad">
          <h2 class="section-title" data-translate="settings.notepad.title"></h2>
          <p class="section-desc" data-translate="settings.notepad.desc"></p>

          <div class="setting-group">
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.notepad.enable.title"></span>
                <span class="setting-desc" data-translate="settings.notepad.enable.desc"></span>
              </div>
              <input type="checkbox" id="notepadEnabled">
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.notepad.popup.title"></span>
                <span class="setting-desc" data-translate="settings.notepad.popup.desc"></span>
              </div>
              <input type="checkbox" id="notepadInWindow">
            </div>
          </div>
        </section>

        <!-- Custom CSS -->
        <section class="settings-section" id="section-customcss">
          <h2 class="section-title" data-translate="settings.customcss.title"></h2>
          <p class="section-desc" data-translate="settings.customcss.desc"></p>
          <textarea
            id="customcss"
            class="secondary-bg"
            placeholder="Write some hot CSS in here...">
          </textarea>
        </section>

        <!-- Backup -->
        <section class="settings-section" id="section-backup">
          <h2 class="section-title" data-translate="settings.backup.title"></h2>
          <p class="section-desc" data-translate="settings.backup.desc"></p>

          <div class="setting-group">
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.backup.export.title"></span>
                <span class="setting-desc" data-translate="settings.backup.export.desc"></span>
              </div>
              <button id="export-settings" data-translate="settings.backup.export.btn"></button>
            </div>
            <div class="setting-divider"></div>
            <div class="setting-row">
              <div class="setting-label">
                <span data-translate="settings.backup.import.title"></span>
                <span class="setting-desc" data-translate="settings.backup.import.desc"></span>
              </div>
              <button id="import-settings-btn" data-translate="settings.backup.import.btn"></button>
              <input type="file" id="import-settings-input" accept=".json" style="display: none">
            </div>
          </div>
        </section>

        <!-- Translations -->
        <section class="settings-section" id="section-translations">
          <h2 class="section-title" data-translate="settings.translations.title"></h2>
          <p class="section-desc" data-translate="settings.translations.desc"></p>
          <div id="translation-coverage-list" class="setting-group"></div>
        </section>

      </main>
    </div>

    <section id="settings-notification"></section>

    <script src="js/options.js"></script>
  </body>
</html>
