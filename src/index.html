<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#14bae4">
    <title>Homepage++</title>

    <!-- Meta data for public demo -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <meta content="Homepage++" property="og:title">
    <meta content="A website that gives you a clean homepage." property="og:description">
    <meta content="A website that gives you a clean homepage." name="description">
    <meta name="revisit-after" content="2 days">

    <!-- Stylesheets -->
    <link href="css/index.css" type="text/css" rel="stylesheet">
  </head>

  <body class="no-overflow no-select">
    <section class="background-container">
      <img id="background" draggable="false">
      <div class="time-container">
        <h1 id="time"></h1>
        <h1 id="date"></h1>
      </div>
      <!-- Search engine -->
      <form id="search-form" role="search" spellcheck="false" novalidate style="display: none;">
        <input
        id="search-input"
        type="text"
        name="q"
        placeholder="Search the web..."
        autocapitalize="off"
        autocorrect="off"
        autocomplete="off"
        />
      </form>
    </section>

    <!-- Weather placeholder -->
    <section id="weather-container" style="display: none;">
      <div class="current">
        <img id="wicon" draggable="false" src="images/weather/clearsky_day.png">
        <div class="details">
          <p id="wname">Placeholder</p>
          <p id="wdescription">Sunholder</p>
          <div class="temp-container">
            <p id="wtemp">21 °C</p>
          </div>
        </div>
      </div>
      <div id="wforecast">
        <div class="forecast-item">
          <span class="forecast-hour">12:00</span>
          <img src="images/weather/clearsky_day.png" draggable="false" alt="Clear sky">
          <span class="forecast-temp">21 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">13:00</span>
          <img src="images/weather/partlycloudy_day.png" draggable="false" alt="Partly cloudy">
          <span class="forecast-temp">22 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">14:00</span>
          <img src="images/weather/partlycloudy_day.png" draggable="false" alt="Partly cloudy">
          <span class="forecast-temp">23 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">15:00</span>
          <img src="images/weather/cloudy.png" draggable="false" alt="Cloudy">
          <span class="forecast-temp">22 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">16:00</span>
          <img src="images/weather/lightrain.png" draggable="false" alt="Light rain">
          <span class="forecast-temp">20 °C</span>
        </div>
      </div>
      <div id="wdailyforecast" style="display: none;"></div>
    </section>

    <!-- Bookmarks -->
    <section id="bookmarks" style="display: none;"></section>

    <!-- Notepad -->
    <div id="notepad" style="display: none" role="button" aria-label="Open notepad" tabindex="0">
      <div class="notepad-inner">
        <div class="notepad-header">
          <button class="notepad-close" title="Collapse notepad" aria-label="Collapse notepad"></button>
        </div>
        <textarea id="notepad-text" spellcheck="false"></textarea>
        <div class="notepad-resize" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Settings -->
    <a id="settings" href="./options.html" target="_blank" style="display: none"></a>

    <!-- Demo Buttons -->
    <section id="demo-buttons" style="display: none;">
      <h2 class="no-margin text-center">Demo settings</h2>
      <label class="default">
        Change language
        <select id="language">
          <option value="">Default: English (United Kingdom)</option>
        </select>
      </label>
      <label class="default">
        Change background
        <input type="text" id="changebg" placeholder="https://">
      </label>
      <label class="default">
        Change font
        <input type="text" id="changefont" placeholder="Times New Roman">
      </label>
      <label class="default">
        Change clock format
        <input type="text" id="changeClock" placeholder="%H:%M:%S">
      </label>
      <label class="default">
        Change date format
        <input type="text" id="changeDate" placeholder="%e. %B %Y">
      </label>
      <label class="default">
        <input type="checkbox" id="timeToggle" checked>
        Toggle time
      </label>
      <label class="default">
        <input type="checkbox" id="dateToggle" checked>
        Toggle date
      </label>
      <label class="default">
        <input type="checkbox" id="searchToggle">
        Toggle search bar
      </label>
      <label class="default">
        <input type="checkbox" id="weather">
        Toggle weather
      </label>
      <label class="default">
        <input type="checkbox" id="bookmarksToggle">
        Toggle bookmarks
      </label>
      <label class="default">
        <input type="checkbox" id="notepadToggle">
        Toggle notepad
      </label>
    </section>

    <!-- Demo: Install button -->
    <a id="install-button" target="_blank" style="display: none;">
      PLACEHOLDER
    </a>

    <!-- Scripts -->
    <script src="js/index.js"></script>
  </body>
</html>
