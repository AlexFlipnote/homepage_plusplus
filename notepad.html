<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"/>
    <title>Notepad</title>
    <link href="css/index.css" type="text/css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="./images/notepad/favicon.ico">
  </head>
  <body class="notepad-window no-select no-overflow">
    <div id="notepad-window">
      <div class="notepad-header">
        <div class="notepad-tabs-wrap">
          <div class="notepad-tabs-bar" role="tablist" aria-label="Note tabs"></div>
        </div>
        <div class="notepad-header-actions">
          <button class="notepad-tab-add" title="Add note" aria-label="Add new note tab"></button>
        </div>
      </div>
      <textarea id="notepad-text" spellcheck="false"></textarea>
    </div>
    <script src="js/notepad.js"></script>
  </body>
</html>
