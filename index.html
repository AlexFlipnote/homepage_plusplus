<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no"/>
    <meta name="theme-color" content="#14bae4">
    <title>Homepage++</title>

    <!-- Meta data for public demo -->
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <meta content="Homepage++" property="og:title">
    <meta content="A web browser extension that allows you to customize your new tab/homepage with fonts, colours, weather and more." property="og:description">
    <meta content="A web browser extension that allows you to customize your new tab/homepage with fonts, colours, weather and more." name="description">
    <meta property="og:image" content="./images/128.png">
    <meta name="revisit-after" content="2 days">

    <!-- Stylesheets -->
    <link href="css/index.css" type="text/css" rel="stylesheet">
  </head>

  <body class="no-overflow no-select no-animations">
    <section class="background-container">
      <img id="background" draggable="false">
      <div class="center-content">
        <div class="time-container">
          <h1 id="time"></h1>
          <h1 id="date"></h1>
        </div>
        <!-- Search engine -->
        <form id="search-form" role="search" spellcheck="false" novalidate style="display: none;">
          <input
          id="search-input"
          type="text"
          name="q"
          placeholder="Search the web..."
          autocapitalize="off"
          autocorrect="off"
          autocomplete="off"
          />
        </form>
      </div>
    </section>

    <!-- Weather placeholder -->
    <section id="weather-container" style="display: none;">
      <div class="current">
        <img id="wicon" draggable="false" src="images/weather/clearsky_day.png">
        <div class="details">
          <p id="wname">Placeholder</p>
          <p id="wdescription">Sunholder</p>
          <div class="temp-container">
            <p id="wtemp">21 °C</p>
          </div>
        </div>
      </div>
      <div id="wforecast">
        <div class="forecast-item">
          <span class="forecast-hour">12:00</span>
          <img src="images/weather/clearsky_day.png" draggable="false" alt="Clear sky">
          <span class="forecast-temp">21 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">13:00</span>
          <img src="images/weather/partlycloudy_day.png" draggable="false" alt="Partly cloudy">
          <span class="forecast-temp">22 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">14:00</span>
          <img src="images/weather/partlycloudy_day.png" draggable="false" alt="Partly cloudy">
          <span class="forecast-temp">23 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">15:00</span>
          <img src="images/weather/cloudy.png" draggable="false" alt="Cloudy">
          <span class="forecast-temp">22 °C</span>
        </div>
        <div class="forecast-item">
          <span class="forecast-hour">16:00</span>
          <img src="images/weather/lightrain.png" draggable="false" alt="Light rain">
          <span class="forecast-temp">20 °C</span>
        </div>
      </div>
      <div id="wdailyforecast" style="display: none;"></div>
    </section>

    <!-- Bookmarks -->
    <section id="bookmarks" style="display: none;"></section>

    <!-- Notepad -->
    <div id="notepad" style="display: none" role="button" aria-label="Open notepad" tabindex="0">
      <div class="notepad-inner">
        <div class="notepad-header">
          <button class="notepad-close" title="Collapse notepad" aria-label="Collapse notepad"></button>
        </div>
        <textarea id="notepad-text" spellcheck="false"></textarea>
        <div class="notepad-resize" aria-hidden="true"></div>
      </div>
    </div>

    <!-- Settings -->
    <a id="settings" href="./options.html" target="_blank" style="display: none"></a>

    <!-- Demo Panel -->
    <aside id="demo-panel" style="display: none;">
      <button class="demo-panel-close" aria-label="Close demo settings">✕</button>

      <h2 class="section-title" data-translate="settings.nav.category.general"></h2>

      <div class="setting-group">
        <div class="setting-row setting-row--column">
          <span data-translate="settings.general.language.title"></span>
          <select id="language">
            <option value="">Default: English (United Kingdom)</option>
          </select>
        </div>
      </div>

      <h2 class="section-title" data-translate="settings.nav.section.timestamp"></h2>

      <div class="setting-group">
        <div class="setting-row setting-row--column">
          <span data-translate="settings.timestamp.clock_style.title"></span>
          <select id="clockStyle">
            <option value="digital">Digital</option>
            <option value="analog">Analog (Swiss)</option>
            <option value="hex">Hex color</option>
            <option value="unix">Unix Timestamp</option>
          </select>
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row" id="demo-row-clock-tumbler">
          <span data-translate="settings.timestamp.clock_tumbler.title"></span>
          <input type="checkbox" id="tumblerToggle">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row" id="demo-row-time-12h">
          <span data-translate="settings.timestamp.time_12h.title"></span>
          <input type="checkbox" id="time12hToggle">
        </div>
      </div>

      <div class="setting-group" id="demo-group-fmt">
        <div class="setting-row setting-row--column">
          <span data-translate="settings.timestamp.time_format.title"></span>
          <input type="text" id="changeClock" placeholder="%H:%M:%S">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row setting-row--column">
          <span data-translate="settings.timestamp.date_format.title"></span>
          <input type="text" id="changeDate" placeholder="%e. %B %Y">
        </div>
      </div>

      <div class="setting-group">
        <div class="setting-row">
          <span data-translate="settings.general.show_time.title"></span>
          <input type="checkbox" id="timeToggle" checked>
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row">
          <span data-translate="settings.general.show_date.title"></span>
          <input type="checkbox" id="dateToggle" checked>
        </div>
      </div>

      <h2 class="section-title" data-translate="settings.nav.category.appearance"></h2>

      <div class="setting-group">
        <div class="setting-row setting-row--column">
          <span data-translate="settings.background.url.title"></span>
          <input type="text" id="changebg" placeholder="https://">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row setting-row--column">
          <span data-translate="settings.font.font_name.title"></span>
          <input type="text" id="changefont" placeholder="Times New Roman">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row">
          <span data-translate="settings.colours.title"></span>
          <div class="colour-picker-widget">
            <button class="colour-swatch" type="button"></button>
            <input type="text" class="colour-hex-input" maxlength="7" spellcheck="false">
            <input type="color" id="demoColourGlobal" class="colour-hidden">
          </div>
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row setting-row--column">
          <span data-translate="settings.scale.global.title"></span>
          <div class="slider-row">
            <input type="range" id="demoUiScale" min="0.5" max="2.0" step="0.1" value="1.0">
            <span id="demoUiScale-label">1.0</span>
          </div>
        </div>
      </div>

      <h2 class="section-title" data-translate="settings.nav.category.features"></h2>

      <div class="setting-group">
        <div class="setting-row">
          <span data-translate="settings.general.searchbar.title"></span>
          <input type="checkbox" id="searchToggle">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row">
          <span data-translate="settings.weather.enable.title"></span>
          <input type="checkbox" id="weather">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row">
          <span data-translate="settings.bookmarks.title"></span>
          <input type="checkbox" id="bookmarksToggle">
        </div>
        <div class="setting-divider"></div>
        <div class="setting-row">
          <span data-translate="settings.notepad.enable.title"></span>
          <input type="checkbox" id="notepadToggle">
        </div>
      </div>
    </aside>

    <!-- Demo Panel Toggle -->
    <button id="demo-panel-toggle" style="display: none;" aria-label="Demo settings"></button>

    <!-- Demo: Install box -->
    <section id="install-box" style="display: none;">
      <span id="install-box-title"></span>
      <a id="install-button-chrome" target="_blank" href="https://chromewebstore.google.com/detail/npagigfpfilcemncemkphndcaigegcbk">PLACEHOLDER</a>
      <a id="install-button-firefox" target="_blank" href="https://addons.mozilla.org/addon/alexflipnote-homepage/">PLACEHOLDER</a>
    </section>

    <!-- Scripts -->
    <script src="js/index.js"></script>
  </body>
</html>
